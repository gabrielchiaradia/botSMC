# ══════════════════════════════════════════════════════════
#  dashboard/nginx.conf
#  Sirve el dashboard HTML + JSONs de logs desde el VPS.
#  Accesible en:  http://TU_IP_VPS:8080
#
#  Seguridad básica incluida:
#    - Autenticación HTTP básica (usuario/contraseña)
#    - Solo sirve .html y .json (nada más)
#    - Headers de seguridad
#    - Rate limiting para no exponer la IP a scrapers
# ══════════════════════════════════════════════════════════

# Rate limiting: máx 10 requests/segundo por IP
limit_req_zone $binary_remote_addr zone=dashboard:10m rate=10r/s;

server {
    listen 80;
    server_name _;   # Acepta cualquier hostname (IP directa)

    # Directorio raíz donde nginx busca los archivos
    # Mapeado al volumen ./dashboard-public en docker-compose
    root /usr/share/nginx/html;

    # Logs de acceso y error
    access_log /var/log/nginx/dashboard_access.log;
    error_log  /var/log/nginx/dashboard_error.log warn;

    # ── Seguridad: headers ────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN"        always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection "1; mode=block"    always;
    add_header Referrer-Policy "no-referrer"       always;
    # Deshabilitar cache en JSONs para que siempre se vea el dato más reciente
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    # ── Autenticación básica ──────────────────────────────
    # Protege el dashboard con usuario/contraseña
    # El archivo .htpasswd se genera en deploy/setup_dashboard.sh
    auth_basic           "SMC Bot Dashboard";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Rate limiting ─────────────────────────────────────
    limit_req zone=dashboard burst=20 nodelay;

    # ── Rutas ─────────────────────────────────────────────

    # Dashboard principal
    location = / {
        try_files /index.html =404;
    }

    # Servir el HTML del dashboard
    location ~* \.html$ {
        try_files $uri =404;
        add_header Content-Type "text/html; charset=utf-8";
    }

    # Servir JSONs de resultados (backtest + bot en vivo)
    # Solo archivos JSON con nombres esperados
    location ~* ^/(data|backtest_results|dashboard_trades_\d{8})\.json$ {
        try_files $uri =404;
        add_header Content-Type "application/json; charset=utf-8";
    }

    # API endpoint: lista los JSONs disponibles
    # El bot los genera automáticamente en /usr/share/nginx/html/
    location = /api/files {
        # Pequeño script que lista los JSON disponibles
        # Se maneja desde el HTML del dashboard directamente
        return 200 '{"status":"ok"}';
        add_header Content-Type "application/json";
    }

    # Bloquear acceso a cualquier otra cosa
    location / {
        deny all;
        return 403;
    }

    # Bloquear archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
