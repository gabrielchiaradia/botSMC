grabysmcserver {
    listen 80;
    server_name grabysmc.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name grabysmc.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/grabysmc.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/grabysmc.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
    location /logs/ {
        alias /usr/share/nginx/html/logs/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin * always;
    }
    location /backtest/ {
        alias /usr/share/nginx/html/backtest/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin * always;
    }
    location /api/logs/ {
        alias /usr/share/nginx/html/logs/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin * always;
    }
}