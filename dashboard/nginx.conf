server {
    listen 80;
    server_name grabysmc.duckdns.org;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
    location /logs/ {
        alias /usr/share/nginx/html/logs/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin * always;
    }
    location /backtest/ {
        alias /usr/share/nginx/html/backtest/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin * always;
    }
    location /api/logs/ {
        alias /usr/share/nginx/html/logs/;
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin * always;
    }
}
