# ══════════════════════════════════════════════════════════
#  docker-compose.yml — SMC Futures Bot
#
#  Servicios:
#    smc-bot     → el bot en sí
#    watchtower  → actualiza la imagen automáticamente desde Git/Registry
#
#  Uso:
#    docker compose up -d              # Arrancar en background
#    docker compose logs -f smc-bot   # Ver logs en tiempo real
#    docker compose down              # Detener
#    docker compose pull && docker compose up -d  # Actualizar
# ══════════════════════════════════════════════════════════

services:

  # ── Bot principal ───────────────────────────────────────
  smc-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: smc-bot:latest
    container_name: smc-bot

    # Reinicio automático siempre (incluso tras reboot del VPS)
    restart: unless-stopped

    # Credenciales desde archivo .env (NUNCA en este archivo)
    env_file:
      - .env

    # Volúmenes persistentes: logs y resultados sobreviven al contenedor
    volumes:
      - ./logs:/app/logs
      - ./backtest/results:/app/backtest/results
      - ./data/cache:/app/data/cache

    # Límites de recursos (ajustar según el plan de Vultr)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.8"
        reservations:
          memory: 128M

    # Healthcheck: si el proceso muere 3 veces consecutivas → unhealthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

    # Logging estructurado con rotación para no llenar el disco
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

    # Seguridad: sin privilegios extra
    security_opt:
      - no-new-privileges:true
    read_only: false

  # ── Watchtower: auto-actualización desde registry ───────
  # Monitorea la imagen smc-bot:latest y la actualiza cuando
  # detecta una nueva versión (útil si usás GitHub Actions + GHCR)
  # Para desactivar: comentar este bloque completo
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      # Solo vigilar el contenedor del bot
      - WATCHTOWER_SCOPE=smc-bot-scope
      # Chequear actualizaciones cada 300 segundos (5 min)
      - WATCHTOWER_POLL_INTERVAL=300
      # Limpiar imágenes viejas automáticamente
      - WATCHTOWER_CLEANUP=true
      # Notificar por Telegram cuando actualice (usa las mismas vars del .env)
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=telegram://${TELEGRAM_TOKEN}@telegram?channels=${TELEGRAM_CHAT_ID}

    labels:
      - "com.centurylinklabs.watchtower.scope=smc-bot-scope"

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Dashboard web (nginx) ───────────────────────────────
  # Sirve el dashboard HTML + JSONs en http://TU_IP:8080
  # Protegido con usuario/contraseña (configurado en setup_dashboard.sh)
  dashboard:
    image: nginx:alpine
    container_name: smc-dashboard
    restart: unless-stopped

    ports:
      - "8080:80"    # Acceder en http://TU_IP_VPS:8080

    volumes:
      - ./dashboard:/usr/share/nginx/html:ro
      - ./logs:/usr/share/nginx/html/logs:ro
      - ./backtest/results:/usr/share/nginx/html/backtest:ro
      - ./dashboard/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dashboard/.htpasswd:/etc/nginx/.htpasswd:ro

    depends_on:
      - smc-bot

    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
